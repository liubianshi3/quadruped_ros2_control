# 蜘蛛机器人ROS2参数文件
spider_robot_controller:
  ros__parameters:
    # 蜘蛛机器人步态参数配置
    gait:
      stride_length: 0.06
      stride_length_max: 0.08
      stride_height: 0.03
      cycle_time: 1.2
      duty_factor: 0.75
      body_height: 0.18
      gait_type: "crawl"
      leg_sequence: ["leg1", "leg2", "leg3", "leg4"]
      phase_offsets:
        leg1: 0.0
        leg2: 90.0
        leg3: 180.0
        leg4: 270.0
      foot_landing_buffer:
        enable: true
        swing_phase_ratio: 0.1
        poly_order: 5
        target_landing_vel_z: 0.01

    standing_pose:
      lf:
        rail_m: 0.0
        hip_roll_rad: 0.0
        hip_pitch_rad: -0.3
        knee_pitch_rad: -0.6
      lh:
        rail_m: 0.0
        hip_roll_rad: 0.0
        hip_pitch_rad: -0.3
        knee_pitch_rad: -0.6
      rh:
        rail_m: 0.0
        hip_roll_rad: 0.0
        hip_pitch_rad: -0.3
        knee_pitch_rad: -0.6
      rf:
        rail_m: 0.0
        hip_roll_rad: 0.0
        hip_pitch_rad: -0.3
        knee_pitch_rad: -0.6
    
    joint_limits:
      # Rotational limits now come from dog2.urdf.xacro.
      # Keep only rail-related compatibility knobs here.
      rail:
        min: -0.05
        max: 0.05
        locked_position: 0.0
        # Deprecated: rail slip monitoring is handled in JointController via parameters.
        slip_threshold: 0.0005
    
    control:
      frequency: 50.0
      max_joint_velocity: 2.0
      max_joint_acceleration: 5.0
      # Limit rail command slew rate (m/s). At 50Hz, 0.15m/s -> 3mm per cycle.
      max_rail_velocity: 0.15
      velocity_scale:
        linear_x: 1.0
        linear_y: 1.0
        angular_z: 1.0
      smooth_stop:
        enabled: true
        deceleration_time: 1.0

    ik_regularization:
      rail_candidates: 17
      dls_lambda: 0.001
      max_iterations: 150
      position_tolerance: 0.01
      rail_neutral_weight: 0.05
      posture_weight: 0.001
      smooth_weight: 0.005
    
    stability:
      com_margin: 0.02
      max_body_tilt: 0.262
      verify_support_triangle: true
      min_support_legs: 3
    
    workspace:
      foot_x_min: -0.35
      foot_x_max: 0.35
      foot_y_min: -0.35
      foot_y_max: 0.35
      foot_z_min: -0.45
      foot_z_max: -0.05
    
    error_handling:
      ik_failure:
        use_last_valid: true
        max_consecutive_failures: 5
      joint_stuck:
        detection_enabled: true
        velocity_threshold: 0.01
        time_threshold: 2.0
        effort_reduction: 0.5
      emergency_posture:
        enabled: true
        body_height: 0.1
        transition_time: 3.0
        rail_lock_effort: 1.0
    
    debug:
      enabled: true
      publish_foot_trajectory: false
      publish_support_triangle: false
      publish_com_projection: false
      log_level: "INFO"
      visualization:
        foot_trajectory_color: [1.0, 0.0, 0.0, 1.0]
        support_triangle_color: [0.0, 1.0, 0.0, 0.5]
        com_projection_color: [0.0, 0.0, 1.0, 1.0]
    debug_mode: true
    
    leg_geometry:
      l0_rail_range: 0.05
      l1_haa_to_hfe: 0.055
      l2_hfe_to_kfe: 0.152
      l3_kfe_to_foot: 0.299
      leg_base_positions:
        leg1: [0.1535, 0.0725, 0.0]    # LF
        leg2: [-0.1535, 0.0725, 0.0]   # LH
        leg3: [-0.1535, -0.0725, 0.0]  # RH
        leg4: [0.1535, -0.0725, 0.0]   # RF
      leg_base_rotations:
        leg1: [1.5708, 0.0, 0.0]       # LF
        leg2: [1.5708, 0.0, -3.1416]   # LH
        leg3: [1.5708, 0.0, -3.1416]   # RH
        leg4: [1.5708, 0.0, 0.0]       # RF
