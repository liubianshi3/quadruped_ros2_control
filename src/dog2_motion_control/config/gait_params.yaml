# 蜘蛛机器人ROS2参数文件
spider_robot_controller:
  ros__parameters:
    # 蜘蛛机器人步态参数配置
    gait:
      stride_length: 0.02
      stride_height: 0.01
      cycle_time: 1.5
      duty_factor: 0.75
      body_height: 0.16
      gait_type: "crawl"
      leg_sequence: ["leg1", "leg2", "leg3", "leg4"]
      phase_offsets:
        leg1: 0.0
        leg2: 90.0
        leg3: 180.0
        leg4: 270.0
    
    joint_limits:
      rail:
        min: -0.05
        max: 0.05
        locked_position: 0.0
        slip_threshold: 0.0005
      haa:
        min: -0.785
        max: 0.785
      hfe:
        min: -1.57
        max: 1.57
      kfe:
        min: -2.356
        max: 0.0
    
    control:
      frequency: 50.0
      max_joint_velocity: 2.0
      max_joint_acceleration: 5.0
      velocity_scale:
        linear_x: 1.0
        linear_y: 1.0
        angular_z: 1.0
      smooth_stop:
        enabled: true
        deceleration_time: 1.0
    
    stability:
      com_margin: 0.02
      max_body_tilt: 0.262
      verify_support_triangle: true
      min_support_legs: 3
    
    workspace:
      foot_x_min: -0.35
      foot_x_max: 0.35
      foot_y_min: -0.35
      foot_y_max: 0.35
      foot_z_min: -0.45
      foot_z_max: -0.05
    
    error_handling:
      ik_failure:
        use_last_valid: true
        max_consecutive_failures: 5
      joint_stuck:
        detection_enabled: true
        velocity_threshold: 0.01
        time_threshold: 2.0
        effort_reduction: 0.5
      emergency_posture:
        enabled: true
        body_height: 0.1
        transition_time: 3.0
        rail_lock_effort: 1.0
    
    debug:
      enabled: true
      publish_foot_trajectory: false
      publish_support_triangle: false
      publish_com_projection: false
      log_level: "INFO"
      visualization:
        foot_trajectory_color: [1.0, 0.0, 0.0, 1.0]
        support_triangle_color: [0.0, 1.0, 0.0, 0.5]
        com_projection_color: [0.0, 0.0, 1.0, 1.0]
    debug_mode: true
    
    leg_geometry:
      l0_rail_range: 0.05
      l1_haa_to_hfe: 0.055
      l2_hfe_to_kfe: 0.152
      l3_kfe_to_foot: 0.299
      leg_base_positions:
        leg1: [0.1535, 0.0725, 0.0]    # LF
        leg2: [-0.1535, 0.0725, 0.0]   # LH
        leg3: [-0.1535, -0.0725, 0.0]  # RH
        leg4: [0.1535, -0.0725, 0.0]   # RF
      leg_base_rotations:
        leg1: [1.5708, 0.0, 0.0]       # LF
        leg2: [1.5708, 0.0, -3.1416]   # LH
        leg3: [1.5708, 0.0, -3.1416]   # RH
        leg4: [1.5708, 0.0, 0.0]       # RF
